# 皮肤站基础配置文件
# 修改后需重启后端生效
# 运营配置（速率限制、材质大小等）请在管理面板修改

# JWT 认证配置
jwt:
  secret: "dev-secret-please-change-in-production"  # 生产环境务必修改！

# RSA 密钥配置
keys:
  private_key: "private.pem"  # 开发环境使用本地路径
  public_key: "public.pem"

# 数据库配置
database:
  path: "yggdrasil.db"

# 材质存储配置
textures:
  directory: "textures"

# 轮播图配置
carousel:
  directory: "carousel"

# 服务器配置
server:
  host: "0.0.0.0"
  port: 8000
  root_path: ""  # 子目录部署时配置，如 "/skin/api"
  site_url: "http://localhost:5173" # 前端站点外部访问地址 (用于 OAuth 回调等)
  api_url: "http://localhost:8000"  # 后端 API 外部访问地址 (用于 Yggdrasil 材质 URL)
  debug: true  # 开启后会输出所有HTTP请求和响应的详细信息（包括图片请求），用于调试

# 内置 Janus（Yggdrasil Connect / OIDC）配置
janus:
  enabled: true
  base_path: "/api/janus"  # 无需额外进程，Janus 兼容接口直接挂载在当前后端
  issuer: ""  # 为空时自动推导为 {api_url}{base_path}
  union_api_base: "https://skin.mualliance.ltd/api/union"
  union_mode: "all"        # all / only / excludes
  union_code: ""           # only/excludes 模式下可填写皮肤站缩写白黑名单代码
  union_key: ""            # Union 返回的站点密钥（仅后台存储，不会暴露到公开接口）
  union_auto_sync: false
  external_write_protection: true  # 开启后拒绝任何外部联合认证来源对本站核心业务数据执行写入

# CORS 跨域配置
cors:
  # 开发环境允许所有来源
  allow_origins: ["*"]
  allow_credentials: true
